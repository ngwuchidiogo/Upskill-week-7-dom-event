<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Task 2 - To-Do List</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; max-width: 500px; }
    input { padding: 8px; width: 70%; }
    button { padding: 8px 12px; cursor: pointer; }
    ul { list-style: none; padding: 0; }
    li { 
      padding: 10px; 
      margin: 5px 0; 
      background: #f4f4f4; 
      display: flex; 
      justify-content: space-between; 
      align-items: center;
    }
    li.completed { text-decoration: line-through; color: gray; } /* Toggles when clicked */
    .delete-btn { background: red; color: white; border: none; }
    #task-count { font-weight: bold; margin-top: 10px; }
  </style>
</head>
<body>
  <h1>My To-Do List</h1>
  <input type="text" id="task-input" placeholder="Enter a task">
  <button id="add-task-btn">Add</button>
  <p id="task-count">Total Tasks: 0</p>
  <ul id="task-list"></ul>

  <script>
    // Store tasks in an array - Bonus
    let tasks = [];

    const taskInput = document.getElementById('task-input');
    const addBtn = document.getElementById('add-task-btn');
    const taskList = document.getElementById('task-list');
    const taskCount = document.getElementById('task-count');

    // Function to update task count
    function updateCount() {
      taskCount.textContent = `Total Tasks: ${tasks.length}`;
    }

    // Add task when button is clicked
    addBtn.addEventListener('click', () => {
      const taskText = taskInput.value.trim();
      if (taskText === "") return; // Don't add empty tasks

      tasks.push(taskText); // add to array

      // Create new list item
      const li = document.createElement('li');
      li.textContent = taskText;

      // Delete button for each item
      const deleteBtn = document.createElement('button');
      deleteBtn.textContent = "Delete";
      deleteBtn.classList.add('delete-btn');
      
      // Remove item when delete is clicked
      deleteBtn.addEventListener('click', (e) => {
        e.stopPropagation(); // prevent li click
        li.remove();
        tasks = tasks.filter(t => t !== taskText); // remove from array
        updateCount();
      });

      // Toggle completed class when task is clicked
      li.addEventListener('click', () => {
        li.classList.toggle('completed');
      });

      li.appendChild(deleteBtn);
      taskList.appendChild(li);
      taskInput.value = ""; // clear input
      updateCount();
    });
  </script>
</body>
</html>
